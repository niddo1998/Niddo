<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Niddo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-section {
            min-height: 100vh;
            background: linear-gradient(135deg, #8B5CF6 0%, #F59E0B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #8B5CF6;
            margin-bottom: 30px;
        }
        .login-logo i {
            margin-right: 10px;
        }
        .role-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .role-btn {
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .role-btn-admin {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            color: white;
            border-color: #8B5CF6;
        }
        .role-btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }
        .role-btn-vecino {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            border-color: #10B981;
        }
        .role-btn-vecino:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
        .role-btn-proveedor {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            color: white;
            border-color: #F59E0B;
        }
        .role-btn-proveedor:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }
        .login-form {
            display: none;
            margin-top: 20px;
        }
        .login-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-control {
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: #8B5CF6;
            box-shadow: 0 0 0 0.2rem rgba(139, 92, 246, 0.25);
        }
        .btn-login-submit {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            color: #8B5CF6;
        }
        .alert {
            display: none;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 10px;
        }
        .alert-danger {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
    </style>
</head>
<body>
    <section class="login-section">
        <div class="login-container">
            <div class="login-logo">
                <i class="fas fa-dove"></i>Niddo
            </div>
            
            <div id="role-selection">
                <h4 class="mb-4">¿Cómo querés ingresar?</h4>
                <div class="role-buttons">
                    <button class="role-btn role-btn-admin" onclick="showLoginForm('admin')">
                        <i class="fas fa-user-tie"></i>
                        Ingresa como Administrador
                    </button>
                    <button class="role-btn role-btn-vecino" onclick="showLoginForm('vecino')">
                        <i class="fas fa-home"></i>
                        Ingresa como Vecino
                    </button>
                    <button class="role-btn role-btn-proveedor" onclick="showLoginForm('proveedor')">
                        <i class="fas fa-handshake"></i>
                        Ingresa como Proveedor
                    </button>
                </div>
            </div>
            
            <form id="login-form" class="login-form" method="POST" action="/login">
                <input type="hidden" id="role-input" name="role" value="">
                <h4 id="login-title" class="mb-3"></h4>
                
                <div class="alert alert-danger" id="error-message">
                    Usuario o contraseña incorrectos
                </div>
                
                <div class="mb-3">
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="Usuario" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login-submit" id="submit-btn">
                    Ingresar
                </button>
                <button type="button" class="back-btn" onclick="showRoleSelection()">
                    <i class="fas fa-arrow-left me-1"></i> Volver
                </button>
            </form>
            
            <div class="mt-4">
                <a href="/" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-1"></i> Volver al inicio
                </a>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedRole = '';
        
        function showLoginForm(role) {
            selectedRole = role;
            document.getElementById('role-input').value = role;
            document.getElementById('role-selection').style.display = 'none';
            document.getElementById('login-form').classList.add('active');
            
            const titles = {
                'admin': 'Ingreso Administrador',
                'vecino': 'Ingreso Vecino',
                'proveedor': 'Ingreso Proveedor'
            };
            
            const colors = {
                'admin': 'linear-gradient(135deg, #8B5CF6, #7C3AED)',
                'vecino': 'linear-gradient(135deg, #10B981, #059669)',
                'proveedor': 'linear-gradient(135deg, #F59E0B, #D97706)'
            };
            
            document.getElementById('login-title').textContent = titles[role];
            document.getElementById('submit-btn').style.background = colors[role];
            document.getElementById('submit-btn').style.color = 'white';
        }
        
        function showRoleSelection() {
            document.getElementById('role-selection').style.display = 'block';
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
        
        // Handle form submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role-input').value;
            
            // Simple authentication check
            if (username === 'admin' && password === '1234') {
                // Redirect to appropriate dashboard
                window.location.href = '/dashboard/' + role;
            } else {
                document.getElementById('error-message').style.display = 'block';
            }
        });
    </script>
</body>
</html>
