<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Niddo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/niddo-brand.css') }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--nd-crema);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Halo terracota tenue: la marca entra por el color, no por un borde. */
        body::before {
            content: '';
            position: fixed;
            inset: -10%;
            background: radial-gradient(55% 55% at 50% 12%, var(--nd-terracota-dim), transparent 70%);
            pointer-events: none;
        }

        .wrap { position: relative; width: 100%; max-width: 400px; }

        .brand { text-align: center; margin-bottom: 1.75rem; }
        .brand .mark {
            width: 60px; height: 60px; border-radius: var(--r-lg);
            background: var(--surface); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; padding: 12px;
            box-shadow: var(--shadow-card);
            text-decoration: none;
        }
        .brand h1 { font-size: 1.4rem; }
        .brand p { color: var(--muted); font-size: .88rem; margin-top: 5px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 1.4rem;
            box-shadow: var(--shadow-window);
        }

        .role-options { display: flex; flex-direction: column; gap: .7rem; }

        .role-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.1rem;
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: var(--font);
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color .2s, background .2s, transform .2s;
            text-align: left;
            text-decoration: none;
        }
        .role-btn:hover {
            border-color: var(--nd-terracota);
            background: var(--nd-terracota-dim);
            transform: translateY(-1px);
        }

        .role-icon {
            width: 46px; height: 46px; border-radius: var(--r-md);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: var(--nd-terracota-dim); color: var(--nd-terracota-hondo);
        }
        .role-icon.vecino { background: var(--nd-verde-dim); color: var(--nd-verde-bosque); }

        .role-info { flex: 1; display: block; }
        .role-name { display: block; font-weight: 700; margin-bottom: .1rem; }
        .role-desc { display: block; font-size: .78rem; color: var(--muted); font-weight: 400; line-height: 1.45; }
        .role-arrow { color: var(--nd-terracota); display: flex; }

        .volver { text-align: center; margin-top: 1.5rem; font-size: .85rem; }
        .volver a { color: var(--nd-terracota-hondo); text-decoration: none; font-weight: 700; }
        .volver a:hover { text-decoration: underline; }
    </style>
</head>
<body>
{% include '_icons.html' %}

    <div class="wrap">
        <div class="brand">
            <a href="/" class="mark" aria-label="Niddo — ir al inicio">
                <svg class="nd-iso" style="width:100%;height:100%"><use href="#nd-isotipo"></use></svg>
            </a>
            <h1>Bienvenido a Niddo</h1>
            <p>Elegí cómo querés ingresar</p>
        </div>

        <div class="card">
            <div class="role-options">
                <a class="role-btn" id="btn-admin" href="/auth/login?role=admin">
                    <span class="role-icon"><svg class="ic ic-lg"><use href="#ic-edificio"></use></svg></span>
                    <span class="role-info">
                        <span class="role-name">Administrador</span>
                        <span class="role-desc">Gestión de expensas, finanzas y consorcio</span>
                    </span>
                    <span class="role-arrow"><svg class="ic ic-sm"><use href="#ic-chevron"></use></svg></span>
                </a>
                <a class="role-btn" id="btn-vecino" href="/auth/login?role=vecino">
                    <span class="role-icon vecino"><svg class="ic ic-lg"><use href="#ic-vecino"></use></svg></span>
                    <span class="role-info">
                        <span class="role-name">Vecino</span>
                        <span class="role-desc">Pagos, reclamos y amenities</span>
                    </span>
                    <span class="role-arrow"><svg class="ic ic-sm"><use href="#ic-chevron"></use></svg></span>
                </a>
            </div>
        </div>

        <div class="volver">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>
</body>
</html>
