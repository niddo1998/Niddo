<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Niddo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue-100:#DCE9FF; --blue-500:#3E7BFA;
            --mint-100:#DBF6EA; --mint-500:#209A69;
            --bg-canvas:#E4EDFC;
            --bg:#F4F7FD;
            --surface:#FFFFFF;
            --hairline: rgba(28,37,58,.09);
            --text:#1B2233;
            --text-muted:#68728A;
            --text-faint:#98A1B5;
            --accent: var(--blue-500);
            --accent-soft: var(--blue-100);
            --accent-ink:#ffffff;
            --shadow-card: 0 1px 2px rgba(28,37,58,.05), 0 8px 22px -12px rgba(28,37,58,.16);
            --shadow-window: 0 30px 70px -28px rgba(24,42,84,.28);
            --r-lg:20px; --r-md:12px; --r-pill:999px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color-scheme: light;
        }

        :root.dark {
            --bg-canvas:#05080F; --bg:#0A101C; --surface:#121A2A;
            --hairline: rgba(230,237,252,.09);
            --text:#ECF0FA; --text-muted:#8D97B0; --text-faint:#565F78;
            --accent:#729BFF; --accent-soft: rgba(114,155,255,.18); --accent-ink:#08132B;
            --shadow-card: 0 1px 2px rgba(0,0,0,.35), 0 8px 22px -12px rgba(0,0,0,.55);
            --shadow-window: 0 30px 70px -28px rgba(0,0,0,.55);
            --blue-100: rgba(114,155,255,.16);
            --mint-100: rgba(32,154,105,.22); --mint-500:#4FDA9E;
            color-scheme: dark;
        }

        body {
            font-family: var(--font);
            background: var(--bg-canvas);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background 0.3s, color 0.3s;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -10%;
            background: radial-gradient(55% 55% at 50% 15%, var(--accent-soft), transparent 70%);
            pointer-events: none;
        }

        .theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--hairline);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: var(--r-pill);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            z-index: 10;
        }
        .theme-toggle:hover { color: var(--text); border-color: var(--accent); }

        .wrap { position: relative; width: 100%; max-width: 400px; }

        .brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .brand .mark {
            width: 52px; height: 52px; border-radius: 16px;
            background: var(--accent); color: var(--accent-ink);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px; font-weight: 800; font-size: 1.3rem;
            box-shadow: var(--shadow-card);
            text-decoration: none;
        }
        .brand h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.01em; }
        .brand p { color: var(--text-muted); font-size: 0.88rem; margin-top: 4px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: var(--r-lg);
            padding: 1.4rem;
            box-shadow: var(--shadow-window);
        }

        .role-options { display: flex; flex-direction: column; gap: 0.7rem; }

        .role-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.1rem;
            border-radius: var(--r-md);
            border: 1px solid var(--hairline);
            background: transparent;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            text-decoration: none;
        }
        .role-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }

        .role-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem; flex-shrink: 0;
            background: var(--blue-100);
        }
        .role-icon.vecino { background: var(--mint-100); }

        .role-info { flex: 1; }
        .role-name { font-weight: 700; margin-bottom: 0.1rem; }
        .role-desc { font-size: 0.78rem; color: var(--text-muted); font-weight: 400; }
        .role-arrow { color: var(--text-faint); font-size: 0.9rem; }

        .divider { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
        .divider a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .divider a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema">🌙</button>

    <div class="wrap">
        <div class="brand">
            <a href="/" class="mark">N</a>
            <h1>Bienvenido a Niddo</h1>
            <p>Elegí cómo querés ingresar</p>
        </div>

        <div class="card">
            <div class="role-options">
                <a class="role-btn admin" id="btn-admin" href="/auth/login?role=admin">
                    <div class="role-icon admin">🏢</div>
                    <div class="role-info">
                        <div class="role-name">Administrador</div>
                        <div class="role-desc">Gestión de expensas, finanzas y consorcio</div>
                    </div>
                    <span class="role-arrow">›</span>
                </a>
                <a class="role-btn vecino" id="btn-vecino" href="/auth/login?role=vecino">
                    <div class="role-icon vecino">🏠</div>
                    <div class="role-info">
                        <div class="role-name">Vecino</div>
                        <div class="role-desc">Pagos, reclamos y amenities</div>
                    </div>
                    <span class="role-arrow">›</span>
                </a>
            </div>
        </div>

        <div class="divider">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const root = document.documentElement;

        function applyTheme(t) {
            root.classList.toggle('dark', t === 'dark');
            toggle.textContent = t === 'dark' ? '☀️' : '🌙';
        }

        applyTheme(localStorage.getItem('theme') || 'light');

        toggle.addEventListener('click', () => {
            const next = root.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        });
    </script>
</body>
</html>
